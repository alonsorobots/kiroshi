<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KIROSHI // jobs</title>
<style>
  :root { --bg:#07090d; --panel:#0d1117; --line:#1b2230; --teal:#1ad1c8; --magenta:#ff2e88; --amber:#ffb648; --green:#4ade80; --text:#d7e0ea; --muted:#6b7a8d; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font:14px/1.45 "Segoe UI",system-ui,sans-serif;
    background-image: radial-gradient(circle at 15% -10%, rgba(26,209,200,.08), transparent 40%), radial-gradient(circle at 110% 10%, rgba(255,46,136,.08), transparent 45%); }
  header { display:flex; align-items:baseline; gap:14px; padding:16px 22px; border-bottom:1px solid var(--line); }
  h1 { font-size:20px; letter-spacing:.35em; margin:0; font-weight:700; color:var(--teal); text-shadow:0 0 12px rgba(26,209,200,.45); }
  .sub { color:var(--muted); letter-spacing:.2em; font-size:11px; text-transform:uppercase; }
  nav.tabs { display:flex; gap:10px; margin-left:24px; }
  nav.tabs a { color:var(--amber); text-decoration:none; font-size:12px; letter-spacing:.12em; text-transform:uppercase; border:1px solid var(--line); padding:4px 10px; border-radius:6px; }
  nav.tabs a:hover { border-color:var(--amber); } nav.tabs a.on { border-color:var(--teal); color:var(--teal); }
  .dot { width:9px;height:9px;border-radius:50%;background:var(--magenta);display:inline-block;margin-left:auto;box-shadow:0 0 10px var(--magenta); }
  .dot.live { background:var(--teal); box-shadow:0 0 10px var(--teal); }
  main { padding:22px; display:grid; gap:14px; max-width:1200px; margin:0 auto; }
  .job { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px 16px; }
  .job .top { display:flex; align-items:center; gap:12px; }
  .name { font-weight:700; letter-spacing:.02em; }
  .counts { color:var(--muted); font-size:12px; font-variant-numeric:tabular-nums; margin-left:auto; }
  .counts b { color:var(--text); } .counts .f { color:var(--magenta); }
  .pill { position:relative; height:20px; background:#0a0f16; border:1px solid var(--line); border-radius:11px; overflow:hidden; margin-top:10px; }
  .pill > .fill { height:100%; background:linear-gradient(90deg,var(--teal),var(--magenta)); width:0%; transition:width .5s ease; }
  .pill > .lbl { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:11px; letter-spacing:.05em; color:#04121a; font-weight:700; mix-blend-mode:screen; }
  .meta { display:flex; gap:10px; align-items:center; margin-top:10px; flex-wrap:wrap; }
  .btn { cursor:pointer; background:transparent; color:var(--amber); border:1px solid var(--line); border-radius:6px; padding:4px 9px; font-size:12px; letter-spacing:.08em; text-transform:uppercase; text-decoration:none; }
  .btn:hover { border-color:var(--amber); }
  .cmd { font-family:ui-monospace,monospace; font-size:12px; color:var(--muted); background:#0a0f16; border:1px solid var(--line); border-radius:6px; padding:5px 8px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:200px; }
  .cmd.open { white-space:normal; word-break:break-all; color:var(--text); }
  .badge { font-size:10px; padding:2px 7px; border-radius:10px; border:1px solid var(--line); text-transform:uppercase; letter-spacing:.1em; }
  .b-run { color:var(--amber); border-color:var(--amber); } .b-done { color:var(--green); border-color:var(--green); }
  .b-fail { color:var(--magenta); border-color:var(--magenta); } .b-wait { color:var(--muted); }
  .empty { color:var(--muted); text-align:center; padding:40px; }
  footer { text-align:center; color:var(--muted); padding:16px; font-size:11px; letter-spacing:.15em; }
</style>
</head>
<body>
  <header>
    <h1>KIROSHI</h1><span class="sub">jobs</span>
    <nav class="tabs"><a href="/">Overview</a><a href="/ui/jobs" class="on">Jobs</a><a href="/ui/history">History</a></nav>
    <span id="live" class="dot"></span>
  </header>
  <main id="list"><div class="empty">loading…</div></main>
  <footer>each job is a campaign of gigs · click the graph for its rate-over-time curve</footer>
<script>
(function(){const u=new URL(location.href);const t=u.searchParams.get("token");if(t){try{localStorage.setItem("kiroshi_token",t)}catch(e){}u.searchParams.delete("token");history.replaceState({},"",u.pathname+(u.search||""))}})();
function tok(){try{return localStorage.getItem("kiroshi_token")||""}catch(e){return""}}
async function aFetch(url,o){o=o||{};const t=tok();if(t)o.headers=Object.assign({},o.headers,{Authorization:"Bearer "+t});o.cache="no-store";const r=await fetch(url,o);if(r.status===401){const e=window.prompt("Mesh token required:");if(e){try{localStorage.setItem("kiroshi_token",e)}catch(x){}return aFetch(url,o)}}return r}
function withTok(url){const t=tok();return t?url+(url.includes("?")?"&":"?")+"token="+encodeURIComponent(t):url}
function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function badge(g){ if(g.failed>0&&g.pending===0&&g.leased===0) return '<span class="badge b-fail">failed</span>';
  if(g.done>=g.total&&g.total>0) return '<span class="badge b-done">complete</span>';
  if(g.leased>0) return '<span class="badge b-run">running</span>';
  return '<span class="badge b-wait">queued</span>'; }
function fmtTime(t){ if(!t) return "—"; const d=new Date(t*1000); return d.toLocaleString(); }
function render(groups){
  const el=document.getElementById("list");
  if(!groups||!groups.length){ el.innerHTML='<div class="empty">no jobs yet — seed some gigs.</div>'; return; }
  el.innerHTML=groups.map(g=>{
    const pct=g.total?(100*g.done/g.total):0;
    const cmds=(g.launch_commands||[]);
    const cmd=cmds.length?cmds[0]:"(launch command unknown — runner not registered yet)";
    const gid=encodeURIComponent(g.grp);
    const pageBtn=g.has_custom_page?`<a class="btn" target="_blank" href="${withTok('/p/job.html?job='+gid)}">▤ page</a>`:"";
    return `<div class="job">
      <div class="top">${badge(g)}<span class="name">${esc(g.grp)}</span>
        <span class="counts"><b>${g.done}</b>/${g.total} done · ${g.leased} in-flight · ${g.pending} queued · <span class="f">${g.failed} failed</span></span></div>
      <div class="pill"><div class="fill" style="width:${pct.toFixed(1)}%"></div><div class="lbl">${pct.toFixed(1)}%</div></div>
      <div class="meta">
        <a class="btn" href="/ui/job?job=${gid}">⟋ graph</a>${pageBtn}
        <span class="cmd" title="click to expand" onclick="this.classList.toggle('open')">${esc(cmd)}</span>
      </div></div>`;
  }).join("");
}
async function tick(){
  const live=document.getElementById("live");
  try{ const r=await aFetch("/groups"); const d=await r.json(); live.classList.add("live"); render(d.groups||[]); }
  catch(e){ live.classList.remove("live"); }
}
tick(); setInterval(tick,2000);
</script>
</body>
</html>
